<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>白马咖啡店 · 前世今生 | 咖啡史诗史料库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Georgia', 'Times New Roman', 'Microsoft YaHei', serif;
        }

        html {
            overflow-y: scroll;
            scrollbar-width: thin;
            scrollbar-color: #aa7c4a #f7ede0;
        }
        html::-webkit-scrollbar {
            width: 8px;
        }
        html::-webkit-scrollbar-track {
            background: #f7ede0;
            border-radius: 12px;
        }
        html::-webkit-scrollbar-thumb {
            background-color: #aa7c4a;
            border-radius: 12px;
        }

        body {
            background: #fdf8f0 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.08"><path fill="%236b3f1c" d="M70,30 L90,10 L110,30 L130,20 L125,45 L145,55 L130,70 L140,90 L115,85 L100,105 L80,85 L55,90 L65,70 L50,55 L70,45 L65,20 Z M100,48 A15,15 0 1,1 100,78 A15,15 0 1,1 100,48 Z"/><circle cx="100" cy="58" r="4" fill="%238b5a2b"/><path d="M85,95 L115,95 L108,110 L92,110 Z" fill="%2394632e"/></svg>');
            background-repeat: repeat;
            background-size: 48px;
            color: #2d2418;
            line-height: 1.55;
            min-height: 100vh;
            opacity: 0;
            animation: beanFade 0.7s ease forwards;
        }

        @keyframes beanFade {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 24px 56px;
            position: relative;
        }

        .page-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #3c2a1f;
            text-shadow: 4px 4px 10px rgba(100, 55, 20, 0.12);
            letter-spacing: 1px;
            background: linear-gradient(135deg, #5a3e28, #9b6e42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            display: inline-block;
            width: 100%;
        }
        .page-title::before,
        .page-title::after {
            content: "☕";
            font-size: 2.2rem;
            opacity: 0.5;
            display: inline-block;
            margin: 0 16px;
            color: #aa7848;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }
        .page-title::after {
            content: "🫘";
        }
        .subhead {
            text-align: center;
            font-size: 0.95rem;
            color: #7f613e;
            border-top: 1px solid #e5cfb3;
            border-bottom: 1px solid #e5cfb3;
            display: inline-block;
            width: auto;
            margin: 0 auto 38px;
            padding: 8px 32px;
            letter-spacing: 2px;
            background: #fff7efaa;
            backdrop-filter: blur(2px);
            border-radius: 60px;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin-bottom: 60px;
        }

        .activity-card {
            background: #fffaf3;
            background-image: radial-gradient(circle at 10% 30%, rgba(200, 150, 80, 0.05) 2%, transparent 2.5%);
            background-size: 22px 22px;
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 18px 30px -12px rgba(60, 40, 20, 0.2), inset 0 1px 0 rgba(255,245,225,0.8);
            padding: 28px 24px 32px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1px solid #ecd9bc;
            min-height: 520px;
        }

        .activity-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 35px -14px #7a5a3a66;
            border-color: #c99f6e;
            background: #fffcf5;
        }

        .activity-name {
            font-size: 1.9rem;
            font-weight: 700;
            font-family: 'Georgia', serif;
            color: #6a3e1c;
            text-align: center;
            letter-spacing: -0.2px;
            border-bottom: 2px dotted #e0c8a8;
            display: inline-block;
            margin-bottom: 20px;
            padding-bottom: 12px;
            width: 100%;
        }

        .activity-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 36px;
            margin-bottom: 20px;
            background: #e8dccc;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .activity-desc {
            font-size: 0.94rem;
            color: #4c3a28;
            line-height: 1.5;
            background: #fdf3e4;
            padding: 14px 18px;
            border-radius: 28px;
            margin: 12px 0 24px;
            border-left: 5px solid #bc8f5a;
            flex-grow: 1;
        }

        .detail-link {
            display: inline-block;
            background: #b46f3a;
            color: #fff3e6;
            text-align: center;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.2s;
            width: 100%;
            text-decoration: none;
            box-shadow: 0 2px 6px #ad7a4b40;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .detail-link:hover {
            background: #8d552c;
            letter-spacing: 2px;
        }

        .activity-details {
            background: #fff7ef;
            border-radius: 56px 40px 56px 40px;
            box-shadow: 0 20px 35px -10px rgba(70, 40, 20, 0.25);
            padding: 36px 32px 48px;
            margin-top: 30px;
            margin-bottom: 30px;
            border: 1px solid #eedbbc;
            backdrop-filter: blur(0px);
            transition: all 0.2s;
        }

        .detail-title {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Georgia', serif;
            color: #5f3f25;
            border-left: 8px solid #bc8756;
            padding-left: 24px;
            margin-bottom: 32px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23bc8756" width="18px" height="18px"><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M12,6c1.1,0,2,0.9,2,2s-0.9,2-2,2 s-2-0.9-2-2S10.9,6,12,6z M12,18c-2.7,0-5.8-1.29-6-4h12C17.8,16.71,14.7,18,12,18z"/></svg>') no-repeat left 0.8rem;
            background-size: 28px;
        }

        .historical-grid {
            display: grid;
            gap: 28px;
            width: 100%;
        }

        /* 精确布局：3个史料 → 3列1行，4个史料 → 2x2 */
        .historical-grid.count-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        .historical-grid.count-4 {
            grid-template-columns: repeat(2, 1fr);
        }
        .historical-grid.count-1 {
            grid-template-columns: 1fr;
            max-width: 700px;
            margin: 0 auto;
        }
        .historical-grid.count-2 {
            grid-template-columns: repeat(2, 1fr);
        }
        /* 5个以上使用响应式2-3列 */
        .historical-grid.count-5,
        .historical-grid.count-6 {
            grid-template-columns: repeat(2, 1fr);
        }
        .historical-grid.count-7,
        .historical-grid.count-8,
        .historical-grid.count-9 {
            grid-template-columns: repeat(3, 1fr);
        }
        .historical-grid.count-more {
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
        }

        .historical-item {
            background: #fffcf7;
            border-radius: 32px;
            padding: 22px 22px 26px;
            border: 1px solid #ebddcd;
            box-shadow: 0 8px 18px rgba(80, 50, 25, 0.05);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .historical-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 28px -8px rgba(110, 70, 30, 0.2);
            border-color: #dbb282;
        }

        .historical-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .historical-number {
            background: #b87a45;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff0e0;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: inset 0 -1px 0 #9b5e31, 0 3px 6px rgba(0,0,0,0.1);
        }
        .historical-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #54371f;
            font-family: Georgia, serif;
        }

        .historical-meta {
            background: #f9efdf;
            padding: 12px 18px;
            border-radius: 24px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .meta-line {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .meta-label {
            font-weight: 700;
            color: #9b6639;
            min-width: 50px;
        }
        .meta-value {
            color: #3c2a1b;
            font-weight: 500;
        }

        .historical-analysis {
            font-size: 0.93rem;
            line-height: 1.55;
            color: #4e3922;
            margin: 10px 0 18px;
            flex-grow: 1;
        }

        .historical-image {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            background: #f3e9db;
            border-radius: 28px;
            margin: 10px 0 6px;
            padding: 10px;
        }
        .error-message {
            background: #ffefe2;
            border-left: 8px solid #c0813f;
            padding: 20px 24px;
            border-radius: 32px;
            color: #754c24;
            font-weight: 500;
        }
        .stats-badge {
            display: inline-block;
            background: #e6d5bd;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
            margin-left: 12px;
            color: #694d2e;
            vertical-align: middle;
        }
        @media (max-width: 1000px) {
            .historical-grid.count-3,
            .historical-grid.count-4,
            .historical-grid.count-5,
            .historical-grid.count-6 {
                grid-template-columns: 1fr !important;
            }
            .page-title { font-size: 2rem; }
            .page-title::before, .page-title::after { font-size: 1.6rem; margin: 0 6px; }
        }
        @media (max-width: 640px) {
            .activity-card { padding: 20px; }
            .detail-title { font-size: 1.6rem; }
        }
        .coffee-badge {
            font-family: monospace;
            font-size: 0.7rem;
            background: #e6d5bd;
            display: inline-block;
            border-radius: 30px;
            padding: 4px 10px;
            margin-top: 6px;
            color: #694d2e;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="home-page">
        <h1 class="page-title">白马咖啡店的前世今生</h1>
        <div style="text-align: center; margin-bottom: 6px;"><span class="subhead">☕ 从东印度群岛到十里洋场 · 咖啡贸易史诗 🫘</span></div>

        <div class="activity-grid">
            <div class="activity-card" data-role="dutch">
                <div class="activity-name">🇳🇱 荷兰商人</div>
                <img data-src="act1/kb1.jpg" data-fallback="act1/kb1.png" alt="荷兰商人 · 咖啡帆船" class="activity-image loading">
                <div class="activity-desc" data-txt="act1/kb1.txt">📜 17世纪阿姆斯特丹商会，咖啡成为黑金……</div>
                <span class="detail-link">📖 进入史料库 →</span>
            </div>
            <div class="activity-card" data-role="java">
                <div class="activity-name">🌾 爪哇农民</div>
                <img data-src="act2/kb2.jpg" data-fallback="act2/kb2.png" alt="爪哇农民 · 咖啡种植" class="activity-image loading">
                <div class="activity-desc" data-txt="act2/kb2.txt">🌿 火山土壤与殖民种植制度，汗水浇灌咖农记忆……</div>
                <span class="detail-link">📖 进入史料库 →</span>
            </div>
            <div class="activity-card" data-role="comprador">
                <div class="activity-name">🎩 上海买办</div>
                <img data-src="act3/kb3.jpg" data-fallback="act3/kb3.png" alt="上海买办·洋行咖啡贸易" class="activity-image loading">
                <div class="activity-desc" data-txt="act3/kb3.txt">🏮 外滩洋行与茶栈，咖啡豆如何登陆老上海……</div>
                <span class="detail-link">📖 进入史料库 →</span>
            </div>
        </div>

        <div class="activity-details" id="activity-details" style="display: none;">
            <h2 class="detail-title" id="detail-title">📜 史料库 · 咖啡岁月</h2>
            <div id="historical-container"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        let currentActivityId = 0;
        
        // 清洗元数据重复前缀（如 类型：类型：专著 → 专著）
        function cleanMetaPrefix(raw) {
            if (!raw) return '——';
            let cleaned = raw.trim();
            cleaned = cleaned.replace(/类型：类型：/g, '类型：');
            cleaned = cleaned.replace(/作者：作者：/g, '作者：');
            cleaned = cleaned.replace(/时间：时间：/g, '时间：');
            cleaned = cleaned.replace(/内容分析：内容分析：/g, '内容分析：');
            if (cleaned.startsWith('类型：')) cleaned = cleaned.slice(3);
            if (cleaned.startsWith('作者：')) cleaned = cleaned.slice(3);
            if (cleaned.startsWith('时间：')) cleaned = cleaned.slice(3);
            if (cleaned.startsWith('内容分析：')) cleaned = cleaned.slice(5);
            cleaned = cleaned.replace(/名称\d+：/g, '');
            return cleaned.trim();
        }

        // 解析单个 sl.txt 档案
        function parseArchiveTxt(content, idx) {
            const lines = content.split(/\r?\n/);
            let record = {
                number: idx,
                name: '',
                type: '',
                author: '',
                time: '',
                analysis: ''
            };
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                if (line.match(/^名称(\d+)?：/)) {
                    let rawVal = line.replace(/^名称\d*：/, '');
                    record.name = cleanMetaPrefix(rawVal);
                }
                else if (line.match(/^类型(\d+)?：/)) {
                    let rawVal = line.replace(/^类型\d*：/, '');
                    record.type = cleanMetaPrefix(rawVal);
                }
                else if (line.match(/^作者(\d+)?：/)) {
                    let rawVal = line.replace(/^作者\d*：/, '');
                    record.author = cleanMetaPrefix(rawVal);
                }
                else if (line.match(/^时间(\d+)?：/)) {
                    let rawVal = line.replace(/^时间\d*：/, '');
                    record.time = cleanMetaPrefix(rawVal);
                }
                else if (line.match(/^内容分析(\d+)?：/)) {
                    let rawVal = line.replace(/^内容分析\d*：/, '');
                    record.analysis = cleanMetaPrefix(rawVal);
                }
                else if (!line.match(/^(名称|类型|作者|时间|内容分析)/) && record.analysis === '') {
                    if (record.analysis.length < 400) record.analysis += line + ' ';
                }
            }
            if (!record.name) record.name = `史料${idx}`;
            if (!record.type) record.type = '档案遗存';
            if (!record.author) record.author = '佚名';
            if (!record.time) record.time = '未详';
            if (!record.analysis) record.analysis = '（原档内容待考）';
            return record;
        }

        /**
         * 精确检测指定活动的实际史料数量（只检测存在的文件）
         * 通过连续 HEAD 请求 sl1.txt, sl2.txt... 直到第一个失败
         * 返回实际存在的文件个数
         * 例如 act1/Archives 下有 sl1,sl2,sl3,sl4 → 返回 4
         */
        async function detectActualArchiveCount(activityId) {
            let count = 0;
            const maxAttempt = 50; // 安全上限
            for (let i = 1; i <= maxAttempt; i++) {
                const url = `act${activityId}/Archives/sl${i}.txt`;
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        count++;
                    } else {
                        // 遇到404或其他错误状态，停止检测（后面文件不存在）
                        break;
                    }
                } catch (e) {
                    // 网络错误也停止
                    break;
                }
            }
            return count;
        }

        /**
         * 获取指定活动的所有史料（仅加载实际存在的文件，数量由 detectActualArchiveCount 决定）
         * 有多少个txt文件就返回多少个史料对象，一个不多一个不少
         */
        async function fetchArchivesByActualCount(activityId) {
            // 先精确检测实际存在的txt文件数量
            const actualCount = await detectActualArchiveCount(activityId);
            
            if (actualCount === 0) {
                return []; // 没有任何史料文件
            }
            
            // 只加载实际存在的文件（1 到 actualCount），不会尝试加载不存在的文件
            const tasks = [];
            for (let i = 1; i <= actualCount; i++) {
                const url = `act${activityId}/Archives/sl${i}.txt`;
                tasks.push(
                    fetch(url)
                        .then(res => {
                            if (!res.ok) throw new Error(`missing sl${i}`);
                            return res.text();
                        })
                        .then(txt => parseArchiveTxt(txt, i))
                        .catch(() => null)
                );
            }
            const results = await Promise.all(tasks);
            // 过滤掉失败项（理论上应该全部成功，因为实际数量已检测）
            const validResults = results.filter(item => item !== null);
            return validResults;
        }

        /**
         * 渲染史料网格 - 只渲染实际存在的史料卡片
         * @param {Array} historicals - 史料对象数组，长度等于实际txt文件个数
         * @param {number} activityId - 活动ID
         */
        function renderHistoricalGrid(historicals, activityId) {
            const container = document.getElementById('historical-container');
            if (!container) return;
            container.innerHTML = '';
            
            if (!historicals.length) {
                container.innerHTML = `<div class="error-message">☕ 暂未读取到史料库档案，请确认 act${activityId}/Archives/ 下存在 sl1.txt, sl2.txt 等文件。</div>`;
                return;
            }

            const count = historicals.length;
            const grid = document.createElement('div');
            let gridClass = 'historical-grid';
            
            // 根据实际数量精准选择布局：3个→3列，4个→2x2，其他数量自适应
            if (count === 3) gridClass += ' count-3';
            else if (count === 4) gridClass += ' count-4';
            else if (count === 1) gridClass += ' count-1';
            else if (count === 2) gridClass += ' count-2';
            else if (count === 5 || count === 6) gridClass += ' count-6';
            else if (count >= 7 && count <= 9) gridClass += ' count-9';
            else gridClass += ' count-more';
            grid.className = gridClass;

            // 遍历实际史料数据，为每个txt文件创建一张卡片
            historicals.forEach(hist => {
                const card = document.createElement('div');
                card.className = 'historical-item';
                const imgJpg = `act${activityId}/Archives/sl${hist.number}.jpg`;
                const imgPng = `act${activityId}/Archives/sl${hist.number}.png`;
                card.innerHTML = `
                    <div class="historical-header">
                        <span class="historical-number">${hist.number}</span>
                        <div class="historical-name">${escapeHtml(hist.name)}</div>
                    </div>
                    <div class="historical-meta">
                        <div class="meta-line"><span class="meta-label">📖 类型</span><span class="meta-value">${escapeHtml(hist.type)}</span></div>
                        <div class="meta-line"><span class="meta-label">✒️ 作者</span><span class="meta-value">${escapeHtml(hist.author)}</span></div>
                        <div class="meta-line"><span class="meta-label">⏳ 时间</span><span class="meta-value">${escapeHtml(hist.time)}</span></div>
                    </div>
                    <img data-src="${imgJpg}" data-fallback="${imgPng}" alt="${escapeHtml(hist.name)}" class="historical-image loading">
                    <div class="historical-analysis">🫘 ${escapeHtml(hist.analysis)}</div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(grid);
            initArchiveImagesLazy();
        }

        // 史料图片懒加载
        function initArchiveImagesLazy() {
            const images = document.querySelectorAll('#historical-container img.historical-image');
            if (!images.length) return;
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        const src = img.dataset.src;
                        const fallback = img.dataset.fallback;
                        if (!src) return;
                        const temp = new Image();
                        temp.onload = () => { img.src = src; img.classList.add('loaded'); img.classList.remove('loading'); };
                        temp.onerror = () => {
                            if (fallback) {
                                const fallImg = new Image();
                                fallImg.onload = () => { img.src = fallback; img.classList.add('loaded'); img.classList.remove('loading'); };
                                fallImg.onerror = () => { img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23f3e6d5" width="200" height="200"/><text x="100" y="110" text-anchor="middle" fill="%23945f36" font-size="18">☕ 咖啡印记</text></svg>'; img.classList.remove('loading'); };
                                fallImg.src = fallback;
                            } else {
                                img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23f3e6d5" width="200" height="200"/><text x="100" y="110" text-anchor="middle" fill="%23945f36">🫘 古影</text></svg>';
                                img.classList.remove('loading');
                            }
                        };
                        temp.src = src;
                        observer.unobserve(img);
                    }
                });
            }, { threshold: 0.2, rootMargin: "80px" });
            images.forEach(img => observer.observe(img));
        }

        // 核心：切换详情展示（单击卡片: 如果已显示同一角色则隐藏，否则展示实际存在的史料卡片）
        async function toggleDetail(activityId, roleDisplayName) {
            const detailsDiv = document.getElementById('activity-details');
            const titleEl = document.getElementById('detail-title');
            const containerHist = document.getElementById('historical-container');
            
            // 情况1：详情可见且是同一个角色 → 隐藏
            if (detailsDiv.style.display === 'block' && currentActivityId === activityId) {
                detailsDiv.style.display = 'none';
                return;
            }
            
            // 情况2：显示新角色的史料库（只展示实际存在的史料卡片）
            currentActivityId = activityId;
            
            // 显示加载状态
            containerHist.innerHTML = `<div style="text-align:center; padding:48px;">⏳ 正在检测史料档案数量... <span style="font-size:1.2rem;">🫘☕</span></div>`;
            detailsDiv.style.display = 'block';
            
            try {
                // 检测实际存在的文件数量
                const actualCount = await detectActualArchiveCount(activityId);
                const countSuffix = actualCount > 0 ? `<span class="stats-badge">📄 ${actualCount} 件史料</span>` : '<span class="stats-badge">📄 0 件史料</span>';
                titleEl.innerHTML = `📚 史料库 · ${roleDisplayName} ${countSuffix}<span class="coffee-badge">咖啡记忆卷宗</span>`;
                
                // 只加载实际存在的史料文件，有多少txt就返回多少个史料对象
                const archives = await fetchArchivesByActualCount(activityId);
                
                if (!archives.length) {
                    containerHist.innerHTML = `<div class="error-message">⚠️ 当前角色「${roleDisplayName}」未找到任何史料档案。请确保 act${activityId}/Archives/sl*.txt 存在。</div>`;
                } else {
                    // 渲染史料卡片：数量 = actualCount，一个不多一个不少
                    renderHistoricalGrid(archives, activityId);
                }
                detailsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (err) {
                console.error(err);
                let msg = `加载失败：${err.message || '请检查网络或文件路径'}`;
                if (window.location.protocol === 'file:') msg = '⚠️ 当前使用 file:// 协议，请使用 HTTP 服务器（python -m http.server）访问以加载完整史料库。';
                containerHist.innerHTML = `<div class="error-message">❌ ${msg}</div>`;
                titleEl.innerHTML = `📚 史料库 · ${roleDisplayName} <span class="coffee-badge">加载出错</span>`;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 初始化首页：图片懒加载、文本加载 + 单击卡片交互
        function initHomeCardsAndToggle() {
            const homeImgs = document.querySelectorAll('.activity-card img.activity-image');
            const imgObserver = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        const src = img.dataset.src;
                        const fall = img.dataset.fallback;
                        if (src) {
                            const loader = new Image();
                            loader.onload = () => { img.src = src; img.classList.add('loaded'); img.classList.remove('loading'); };
                            loader.onerror = () => {
                                if (fall) {
                                    const fallImg = new Image();
                                    fallImg.onload = () => { img.src = fall; img.classList.add('loaded'); img.classList.remove('loading'); };
                                    fallImg.onerror = () => { img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23e5d5be" width="200" height="200"/><text x="100" y="110" text-anchor="middle" fill="%2375512e">☕ 老相片</text></svg>'; img.classList.remove('loading'); };
                                    fallImg.src = fall;
                                } else {
                                    img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23e5d5be" width="200" height="200"/><text x="100" y="110" text-anchor="middle" fill="%2375512e">🫘 咖啡时光</text></svg>';
                                    img.classList.remove('loading');
                                }
                            };
                            loader.src = src;
                        }
                        obs.unobserve(img);
                    }
                });
            }, { threshold: 0.2 });
            homeImgs.forEach(img => imgObserver.observe(img));
            
            // 加载场景文本摘要
            const descs = document.querySelectorAll('.activity-desc[data-txt]');
            descs.forEach(el => {
                const url = el.dataset.txt;
                if (url) fetch(url).then(r => r.ok ? r.text() : Promise.reject()).then(txt => {
                    el.textContent = txt.trim().substring(0, 160) + (txt.length > 160 ? '…' : '');
                }).catch(() => { el.textContent = '📜 咖啡史料手稿待加载，请确认路径。'; });
            });
            
            // 绑定卡片单击：单击展示详情（精确显示实际存在的史料数量，有多少个txt就展示多少张卡片）
            const cards = document.querySelectorAll('.activity-card');
            cards.forEach((card, idx) => {
                let actId = 0;
                let roleDisplay = '';
                if (idx === 0) { actId = 1; roleDisplay = '荷兰商人 · 香料航线'; }
                else if (idx === 1) { actId = 2; roleDisplay = '爪哇农民 · 殖民种植园'; }
                else { actId = 3; roleDisplay = '上海买办 · 洋场咖啡市集'; }
                
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleDetail(actId, roleDisplay);
                });
            });
        }
        
        // 本地协议提醒
        if (window.location.protocol === 'file:') {
            const warn = document.createElement('div');
            warn.className = 'error-message';
            warn.style.marginBottom = '20px';
            warn.innerHTML = '🫘 提示：当前为本地文件模式，建议使用 `python -m http.server` 运行以便完整加载咖啡史料图片及文本。';
            document.querySelector('.activity-grid')?.insertAdjacentElement('beforebegin', warn);
        }
        
        // ESC 快捷隐藏
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const details = document.getElementById('activity-details');
                if (details && details.style.display === 'block') {
                    details.style.display = 'none';
                }
            }
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            initHomeCardsAndToggle();
        });
    })();
</script>
</body>
</html>
